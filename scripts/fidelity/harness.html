<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<!--
  Visual-fidelity harness (slice s3a-visual-harness, issue #79; shell rebuilt for
  s3a-design-shell, issue #80).

  This page hosts the REAL org-panel webview assets (../../media/orgPanel.css and
  ../../media/orgPanel.js) exactly as the extension ships them, so the fidelity
  screenshot shows what the panel actually renders, not a hand-drawn copy. It stands
  in for the VS Code webview host by:

    1. defining acquireVsCodeApi() before orgPanel.js runs (the script calls it at
       module load; without the stub the whole script throws and nothing renders);
    2. reproducing the EXACT static DOM skeleton orgPanelWebview.renderHtml emits
       (the New session pill, the gear, the sort button + popover, the search box with
       its magnifier and clear button, the #chips rail, and the #list role="tree"
       container) so the script's getElementById wiring finds every node it expects.
       This shell MUST stay byte-aligned with renderHtml; the fidelity lens is the
       reminder if it drifts;
    3. posting synthetic 'state' then 'sections' messages in the SAME shape the host
       posts (orgPanelWebview.postState / postSections; see OrgSections and OrgChatRow
       in src/views/orgPanelModel.ts), so the script's message handler renders the
       mock exactly as it would render real data.

  ALL mock data here is synthetic. No real transcript content is embedded, so nothing
  private is committed. The mock deliberately carries starred:true rows, per-row status
  ('question' -> blinking '?' badge, 'done' -> solid unread dot; design README line 51),
  a folder-path breadcrumb on the Questions rows, an ACTIVE row (posted via an 'active'
  message so the currently-open chat shows the #F6E5DB tint + inset left border, the
  ONLY row tint), colored folders, colored tag chips, and archivedCount > 0, so
  re-running the harness surfaces every visual the shipped asset draws for slice
  s3a-row-anatomy (the depth indents 11/29/47, the done-dot, the blinking-'?' badge, the
  Questions breadcrumb, the star toggle glyph, the active-row tint, the FOLDERS + / ^
  buttons, and the Archived (N) row). No per-row token badge is drawn (tokens moved to
  the hover card), so the harness deliberately does not assert one.

  The palette is now HARDCODED in orgPanel.css (s3a-design-shell), so the old
  --vscode-* shim is a no-op and has been removed; only the 320px width + panel
  background pin remains so the screenshot frames the panel exactly as a 320px sidebar
  would (UI-SPEC deviation 1). The Newsreader @font-face in orgPanel.css resolves its
  relative fonts/ url against ../../media/, which exists in the repo, so the harness
  loads the same bundled face the extension ships.
-->
<style id="harness-frame">
  html, body {
    margin: 0;
    padding: 0;
    background: #FCFBF8;
  }
  body {
    width: 320px;
  }
</style>
<link href="../../media/orgPanel.css" rel="stylesheet" />
</head>
<body>
  <!--
    The exact static shell orgPanelWebview.renderHtml emits. Kept byte-aligned with
    that host so the harness exercises the real script wiring; if the host shell
    changes, this must change with it (the fidelity lens is the reminder).
  -->
  <div class="nest-toolbar">
    <button id="newSession" class="nest-new-session" type="button" title="New session" aria-label="New session"><span class="nest-new-session-plus" aria-hidden="true">+</span>New session</button>
    <span class="nest-spacer"></span>
    <button id="settings" class="nest-icon-btn" type="button" title="Settings" aria-label="Settings" aria-haspopup="dialog">&#9881;</button>
    <span class="nest-sort-wrap">
      <button id="sortBtn" class="nest-icon-btn" type="button" title="Sort" aria-label="Sort chats" aria-haspopup="menu" aria-expanded="false">&#8645;</button>
      <div id="sortPopover" class="nest-popover" role="menu" aria-label="Sort chats" hidden>
        <div class="nest-popover-title">SORT BY</div>
        <button class="nest-popover-item" type="button" role="menuitemradio" data-sort="newest" aria-checked="true"><span>Newest first</span><span class="nest-popover-check" aria-hidden="true">&#10003;</span></button>
        <button class="nest-popover-item" type="button" role="menuitemradio" data-sort="oldest" aria-checked="false"><span>Oldest first</span><span class="nest-popover-check" aria-hidden="true">&#10003;</span></button>
        <button class="nest-popover-item" type="button" role="menuitemradio" data-sort="name" aria-checked="false"><span>Name (A-Z)</span><span class="nest-popover-check" aria-hidden="true">&#10003;</span></button>
      </div>
    </span>
  </div>
  <div class="nest-search">
    <span class="nest-search-icon" aria-hidden="true"><svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="#A6A294" stroke-width="1.6"/><line x1="10.8" y1="10.8" x2="14.5" y2="14.5" stroke="#A6A294" stroke-width="1.6" stroke-linecap="round"/></svg></span>
    <input id="filter" class="nest-filter" type="text" placeholder="Search chats &amp; messages" aria-label="Search chats and messages" />
    <button id="searchClear" class="nest-search-clear" type="button" title="Clear search" aria-label="Clear search" hidden>&#215;</button>
  </div>
  <div id="chips" class="nest-chips" role="group" aria-label="Tag filters"></div>
  <div id="list" class="nest-tree" role="tree" aria-label="Organized chats" tabindex="0"></div>

  <!--
    The acquireVsCodeApi stub MUST be defined before orgPanel.js loads: the script
    calls acquireVsCodeApi() at module scope, so an undefined global throws before a
    single row renders. postMessage/setState/getState are captured (not needed for a
    static screenshot) so any outbound message from the script is a harmless no-op.
  -->
  <script>
    (function () {
      const outbound = [];
      // The host content-search reply the harness stands in for. When the panel
      // posts { type:'search', query } (the debounced content-search request, issue
      // #83), the real extension host answers with { type:'searchResults' } ranked
      // rows carrying a role-prefixed body-match snippet. The harness must reply too,
      // or the flat "N RESULTS" state renders 0 results and the fidelity capture of
      // the results state (issue #83 AC #6) goes blind. The reply is synthetic and
      // deterministic: for a non-empty query it returns the 'Rate limiter design'
      // chat (s-11, filed under Work / Backend API, so it shows a breadcrumb) with a
      // "You: ..." body-match snippet, matching the prototype's redis-filtered state.
      // An empty query returns no rows (mirrors the host short-circuit).
      window.__nestHarnessSearchReply = function (query) {
        const q = (query || '').trim();
        if (q.length === 0) {
          return { type: 'searchResults', query: query, rows: [] };
        }
        return {
          type: 'searchResults',
          query: query,
          rows: [
            {
              rank: 0,
              sessionId: 's-11',
              title: 'Rate limiter design',
              description: '3h',
              timestamp: Date.now() - 3 * 60 * 60 * 1000,
              tokens: '~20k tok',
              snippet: 'You: ...a token-bucket rate limiter backed by Redis for the public API...',
            },
          ],
        };
      };
      // The host reply for an openArchive request (slice s3b-archive-overlay, issue #87).
      // When the panel opens the Archive overlay it posts { type:'openArchive' }; the real
      // extension host answers with { type:'archivedRows', rows } built by buildArchivedRows
      // from the synced userArchived membership. The harness must reply too, or the overlay
      // renders an empty "Nothing archived." state and the archive fidelity capture goes
      // blind. The rows are synthetic and deterministic: two present archived chats (one
      // filed, one unsorted) plus one cleaned-up (gone) chat, matching the prototype's
      // archived set (c7 "Resume rewrite" filed, c12 "Onboarding flow copy" unsorted). All
      // titles are invented.
      window.__nestHarnessArchivedRows = function () {
        return {
          type: 'archivedRows',
          rows: [
            {
              sessionId: 'arch-1',
              title: 'Resume rewrite',
              folder: 'Personal',
              relativeTime: '1w',
              starred: false,
              present: true,
            },
            {
              sessionId: 'arch-2',
              title: 'Onboarding flow copy',
              folder: 'Unsorted',
              relativeTime: '2mo',
              starred: false,
              present: true,
            },
            {
              sessionId: 'arch-gone',
              title: 'Old spike notes',
              folder: 'Unsorted',
              relativeTime: '',
              starred: false,
              present: false,
            },
          ],
        };
      };
      window.acquireVsCodeApi = function () {
        return {
          postMessage: function (m) {
            outbound.push(m);
            // Echo a synthetic host reply for a content-search request so the
            // results view populates exactly as it would against the real host.
            if (m && m.type === 'search') {
              const reply = window.__nestHarnessSearchReply(m.query);
              window.postMessage(reply, '*');
            }
            // Echo the synthetic archived-rows reply for an openArchive request so the
            // Archive overlay populates exactly as it would against the real host.
            if (m && m.type === 'openArchive') {
              window.postMessage(window.__nestHarnessArchivedRows(), '*');
            }
          },
          setState: function () {},
          getState: function () { return undefined; },
        };
      };
      // Exposed only so the screenshot driver can confirm the script initialised
      // (it posts { type: 'ready' } on load); not part of the rendered surface.
      window.__nestHarnessOutbound = outbound;
    })();
  </script>

  <!-- The real, shipped panel script. Renders the mock posted below. -->
  <script src="../../media/orgPanel.js"></script>

  <!--
    Synthetic mock data, posted in the exact host message shape. Timestamps are
    computed relative to load time so the panel's relative() helper produces the
    design's age buckets (35m / 3h / 1d / 2w) deterministically at capture.
  -->
  <script>
    (function () {
      const MIN = 60 * 1000;
      const HOUR = 60 * MIN;
      const DAY = 24 * HOUR;
      const now = Date.now();

      // Palette pulled verbatim from media/design/README.md so the colored folders
      // and tag chips read in the handoff hues.
      const TAG = {
        bug: '#B14F36',
        feature: '#9A6B1E',
        refactor: '#5E7148',
        research: '#4F6582',
        docs: '#3F7572',
        idea: '#7B5C82',
      };
      const FOLDER = {
        release: '#d97757',
        api: '#4F6582',
        ideasColor: '#7B5C82',
        defaultColor: '#C2A56E',
      };

      // Reusable synthetic rows. Each matches the OrgChatRow shape exactly:
      // { sessionId, title, timestamp, tokens, snippet, tags, tagIds, tagColors,
      //   starred, awaitingReply, status, breadcrumb }. tagColors is parallel to tags.
      // status is the per-row status slot (design README line 51): 'question' ->
      // blinking '?' badge, 'done' -> solid unread dot, 'none' -> empty slot.
      // awaitingReply mirrors (status === 'question'). breadcrumb is the folder path
      // rendered on Questions/search rows (null otherwise). tokens rides the seam for
      // the search row / hover card but is NOT drawn on the visible row.
      function row(o) {
        return {
          sessionId: o.sessionId,
          title: o.title,
          timestamp: o.timestamp,
          tokens: o.tokens || '',
          snippet: o.snippet || null,
          tags: o.tags || [],
          tagIds: o.tagIds || [],
          tagColors: o.tagColors || [],
          starred: !!o.starred,
          awaitingReply: o.status === 'question',
          status: o.status || 'none',
          breadcrumb: o.breadcrumb || null,
        };
      }

      // The ACTIVE + starred chat: an UNREAD non-question assistant reply -> solid
      // 'done' dot (matches the design reference's first Starred/Backend-API row).
      const rStarredDone = row({
        sessionId: 's-01',
        title: 'Refactor auth middleware',
        timestamp: now - 35 * MIN,
        tokens: '~48k tok',
        tags: ['refactor', 'bug'],
        tagIds: ['t-refactor', 't-bug'],
        tagColors: [TAG.refactor, TAG.bug],
        starred: true,
        status: 'done',
      });
      const rStarredIdea = row({
        sessionId: 's-10',
        title: 'Trip itinerary — Japan',
        timestamp: now - 1 * HOUR,
        tokens: '~9k tok',
        tags: ['idea'],
        tagIds: ['t-idea'],
        tagColors: [TAG.idea],
        starred: true,
        status: 'none',
      });
      const rQuestionDocs = row({
        sessionId: 's-02',
        title: 'Webhook retry strategy',
        timestamp: now - 15 * MIN,
        tokens: '~12k tok',
        tags: ['docs'],
        tagIds: ['t-docs'],
        tagColors: [TAG.docs],
        status: 'question',
      });
      // A Questions row that is FILED, so it carries a folder-path breadcrumb.
      const rQuestionFeature = row({
        sessionId: 's-11',
        title: 'Rate limiter design',
        timestamp: now - 3 * HOUR,
        tokens: '~20k tok',
        tags: ['feature'],
        tagIds: ['t-feature'],
        tagColors: [TAG.feature],
        status: 'question',
        breadcrumb: 'Work / Backend API',
      });
      const rApiChild = row({
        sessionId: 's-05',
        title: 'Fix N+1 query in orders',
        timestamp: now - 1 * DAY,
        tokens: '~22k tok',
        tags: ['bug'],
        tagIds: ['t-bug'],
        tagColors: [TAG.bug],
        status: 'none',
      });
      const rUnsorted1 = row({
        sessionId: 's-08',
        title: 'Webhook retry strategy',
        timestamp: now - 15 * MIN,
        tokens: '~2k tok',
        tags: ['docs'],
        tagIds: ['t-docs'],
        tagColors: [TAG.docs],
        status: 'question',
      });
      const rUnsorted2 = row({
        sessionId: 's-09',
        title: 'CSS grid cheatsheet',
        timestamp: now - 2 * DAY,
        tokens: '~3k tok',
        tags: ['docs', 'idea'],
        tagIds: ['t-docs', 't-idea'],
        tagColors: [TAG.docs, TAG.idea],
        status: 'none',
      });

      // The full section model, in the exact OrgSections shape. Covers Starred,
      // Questions (heuristic), a nested folder hierarchy with per-folder color
      // (Work with a Backend API child folder, Personal, Experiments), the
      // always-present synthetic Unsorted bucket, the tag filter chips with counts,
      // and archivedCount so the bottom Archived row renders. Each folder carries
      // depth (clamped render depth), treeDepth (true stored depth, used by the
      // collapse/hide skip), and rolledUpCount (its own chats + all descendants;
      // issue #82 AC1). f-legacy is a depth-2 grandchild under Backend API to
      // exercise the render clamp (issue #82 AC4): its treeDepth is 2 and it renders
      // at the depth-2 (47px) tier, the deepest the UI shows.
      const sections = {
        starred: [rStarredDone, rStarredIdea],
        questions: [rQuestionDocs, rQuestionFeature],
        folders: [
          {
            folderId: 'f-work',
            name: 'Work',
            color: FOLDER.defaultColor,
            depth: 0,
            treeDepth: 0,
            synthetic: false,
            rolledUpCount: 4,
            rows: [],
          },
          {
            folderId: 'f-api',
            name: 'Backend API',
            color: FOLDER.defaultColor,
            depth: 1,
            treeDepth: 1,
            synthetic: false,
            rolledUpCount: 4,
            rows: [rStarredDone, rQuestionFeature, rApiChild],
          },
          {
            folderId: 'f-legacy',
            name: 'Legacy v1 (deep)',
            color: FOLDER.ideasColor,
            depth: 2,
            treeDepth: 2,
            synthetic: false,
            rolledUpCount: 1,
            rows: [rUnsorted2],
          },
          {
            folderId: 'f-frontend',
            name: 'Frontend',
            color: FOLDER.defaultColor,
            depth: 1,
            treeDepth: 1,
            synthetic: false,
            rolledUpCount: 0,
            rows: [],
          },
          {
            folderId: 'f-personal',
            name: 'Personal',
            color: FOLDER.defaultColor,
            depth: 0,
            treeDepth: 0,
            synthetic: false,
            rolledUpCount: 1,
            rows: [rStarredIdea],
          },
          {
            folderId: 'f-experiments',
            name: 'Experiments',
            color: FOLDER.defaultColor,
            depth: 0,
            treeDepth: 0,
            synthetic: false,
            rolledUpCount: 0,
            rows: [],
          },
          {
            folderId: '__unfiled__',
            name: 'Unsorted',
            depth: 0,
            treeDepth: 0,
            synthetic: true,
            rolledUpCount: 2,
            rows: [rUnsorted1, rUnsorted2],
          },
        ],
        tags: [
          { tagId: 't-bug', label: 'bug', color: TAG.bug, count: 2 },
          { tagId: 't-feature', label: 'feature', color: TAG.feature, count: 2 },
          { tagId: 't-refactor', label: 'refactor', color: TAG.refactor, count: 1 },
          { tagId: 't-research', label: 'research', color: TAG.research, count: 1 },
          { tagId: 't-idea', label: 'idea', color: TAG.idea, count: 2 },
          { tagId: 't-docs', label: 'docs', color: TAG.docs, count: 3 },
        ],
        // allTags is the FULL project tag list the chat context menu lists (issue #85
        // AC #1): every tag with id/label/color/count, INCLUDING a zero-chat tag the chip
        // row (tags) omits. 't-migration' (count 0) exercises the "list a tag no chat
        // carries yet" case in the harness context-menu capture.
        allTags: [
          { tagId: 't-bug', label: 'bug', color: TAG.bug, count: 2 },
          { tagId: 't-docs', label: 'docs', color: TAG.docs, count: 3 },
          { tagId: 't-feature', label: 'feature', color: TAG.feature, count: 2 },
          { tagId: 't-idea', label: 'idea', color: TAG.idea, count: 2 },
          { tagId: 't-migration', label: 'migration', color: TAG.research, count: 0 },
          { tagId: 't-refactor', label: 'refactor', color: TAG.refactor, count: 1 },
          { tagId: 't-research', label: 'research', color: TAG.research, count: 1 },
        ],
        archivedCount: 2,
      };

      // Post state first (sort/collapsed), then the sections, then the active chat,
      // matching the host's onMessage('ready') order (postState, postSections,
      // postActive). s-01 is the currently-open chat, so its rows carry the .nest-active
      // tint (the design reference's tinted Starred + Backend-API "Refactor auth" rows).
      window.postMessage({ type: 'state', sort: 'newest', collapsedFolders: [] }, '*');
      // The Settings overlay state (slice s3b-settings-overlay, issue #86): a 30-day
      // auto-archive window and all four sections ON, matching the design's default
      // Settings sub-page. The overlay reads this on the settings-overlay capture page.
      window.postMessage(
        {
          type: 'settings',
          autoArchiveWindowDays: 30,
          sectionsVisible: { starred: true, questions: true, folders: true, unsorted: true },
        },
        '*',
      );
      window.postMessage({ type: 'sections', sections: sections }, '*');
      window.postMessage({ type: 'active', sessionId: 's-01' }, '*');

      // Signal to the screenshot driver that the mock has been posted so it can wait
      // for a rendered row rather than a fixed delay.
      window.__nestHarnessReady = true;
    })();
  </script>
</body>
</html>
